services:
  reprokit:
    build:
      context: .
    image: reprokit:local
    container_name: reprokit
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - reprokit_runs:/app/.runs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  reprokit_runs:
